name: Profile Service CI/CD

on:
  push:
    paths:
      - 'profile-service/**'
      - '.github/workflows/profile-service.yml'
  pull_request:
    paths:
      - 'profile-service/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests (H2 in-memory, no MySQL needed)
        working-directory: profile-service
        run: mvn test --no-transfer-progress -Dspring.profiles.active=test

      - name: Build JAR
        working-directory: profile-service
        run: mvn package -DskipTests --no-transfer-progress

      - name: Build Docker image
        working-directory: profile-service
        run: docker build -t legends/profile-service:${{ github.sha }} .

