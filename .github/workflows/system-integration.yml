name: System Integration CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Step 1: Run each service's own unit tests in parallel
  unit-tests:
    name: Unit Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [battle-service, profile-service, data-service, pve-service, pvp-service]
      fail-fast: false   # report all failures, not just the first

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests for ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn test --no-transfer-progress -Dspring.profiles.active=test

  # Step 2: Build all Docker images
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all service JARs
        run: |
          for svc in battle-service profile-service data-service pve-service pvp-service; do
            echo "==> Building $svc"
            (cd $svc && mvn package -DskipTests --no-transfer-progress)
          done

      - name: Build Docker images via docker-compose
        run: docker compose build --no-cache

  # Step 3: Smoke-test the full stack
  integration-smoke-test:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs (needed for Docker images)
        run: |
          for svc in battle-service profile-service data-service pve-service pvp-service; do
            (cd $svc && mvn package -DskipTests --no-transfer-progress)
          done

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy (90 s max)
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 18); do
            all_up=true

            check() {
              curl -sf "http://localhost:$1/health" > /dev/null 2>&1 || \
              curl -sf "http://localhost:$1/api/$2/health" > /dev/null 2>&1
            }

            check 8080  "gateway"  || all_up=false   # gateway
            check 5000  "profile"  || all_up=false
            check 5001  "battle"   || all_up=false
            check 5002  "pve"      || all_up=false
            check 5003  "data"     || all_up=false
            check 5004  "pvp"      || all_up=false

            if $all_up; then
              echo "All services are up."
              break
            fi
            echo "Attempt $i/18 — not all services ready yet. Retrying in 5s..."
            sleep 5
          done

      - name: Smoke test — register a user
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8080/api/profile/register \
            -H 'Content-Type: application/json' \
            -d '{"username":"citest_user","password":"cipassword"}')
          echo "Register response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || \
          echo "$RESPONSE" | grep -q '"already exists"' # already registered is fine

      - name: Smoke test — login
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8080/api/profile/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"citest_user","password":"cipassword"}')
          echo "Login response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true'
          USER_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['userId'])")
          echo "USER_ID=$USER_ID" >> $GITHUB_ENV

      - name: Smoke test — start PvE campaign
        run: |
          RESPONSE=$(curl -sf -X POST "http://localhost:8080/api/pve/${USER_ID}/start" \
            -H 'Content-Type: application/json' \
            -d '[{"name":"Aldric","heroClass":"WARRIOR","level":1,"attack":5,"defense":5,"hp":100,"maxHp":100,"mana":50,"maxMana":50}]')
          echo "Start campaign response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true'

      - name: Smoke test — advance to next room
        run: |
          RESPONSE=$(curl -sf -X POST "http://localhost:8080/api/pve/${USER_ID}/next-room")
          echo "Next room response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true'

      - name: Smoke test — battle-service health
        run: curl -sf http://localhost:5001/api/battle/health

      - name: Smoke test — pvp invite (should fail — no saved party yet)
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8080/api/pvp/invite \
            -H 'Content-Type: application/json' \
            -d '{"fromUsername":"citest_user","toUsername":"nobody"}')
          echo "PvP invite response: $RESPONSE"
          # Expected to return an error — we just confirm it responds

      - name: Print docker logs on failure
        if: failure()
        run: docker compose logs --tail=60

      - name: Tear down stack
        if: always()
        run: docker compose down -v
