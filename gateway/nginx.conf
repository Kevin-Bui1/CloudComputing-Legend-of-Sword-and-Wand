events {
    worker_connections 1024;
}

http {
    #Upstream service blocks

    upstream profile_service {
        server profile-service:5000;
    }

    upstream battle_service {
        server battle-service:5001;
    }

    upstream pve_service {
        server pve-service:5002;
    }

    upstream data_service {
        server data-service:5003;
    }

    upstream pvp_service {
        server pvp-service:5004;
    }

    #Main server block — single entry point on port 8080
    server {
        listen 8080;
        server_name localhost;

        # Return CORS headers so a browser-based client can call the gateway
        add_header 'Access-Control-Allow-Origin'  '*'                               always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization'     always;

        location / {
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        #/api/profile/** → profile-service:5000
        location /api/profile/ {
            proxy_pass         http://profile_service/api/profile/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        #/api/battle/** → battle-service:5001
        location /api/battle/ {
            proxy_pass         http://battle_service/api/battle/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        #/api/pve/** → pve-service:5002
        location /api/pve/ {
            proxy_pass         http://pve_service/api/pve/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        #/api/data/** → data-service:5003
        location /api/data/ {
            proxy_pass         http://data_service/api/data/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        #/api/pvp/** → pvp-service:5004
        location /api/pvp/ {
            proxy_pass         http://pvp_service/api/pvp/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        #Health check for the gateway itself
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        #Serve the client GUI (static files built into the image)
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
