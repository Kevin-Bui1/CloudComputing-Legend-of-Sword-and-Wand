events {
    worker_connections 1024;
}

http {
    upstream profile_service {
        server profile-service:5000;
    }

    upstream battle_service {
        server battle-service:5001;
    }

    upstream pve_service {
        server pve-service:5002;
    }

    upstream data_service {
        server data-service:5003;
    }

    upstream pvp_service {
        server pvp-service:5004;
    }

    server {
        listen 8080;
        server_name localhost;

        add_header 'Access-Control-Allow-Origin'  '*'                                    always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization'          always;

        location /api/profile/ {
            proxy_pass         http://profile_service/api/profile/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /api/battle/ {
            proxy_pass         http://battle_service/api/battle/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /api/pve/ {
            proxy_pass         http://pve_service/api/pve/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /api/data/ {
            proxy_pass         http://data_service/api/data/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /api/pvp/ {
            proxy_pass         http://pvp_service/api/pvp/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        location / {
            if ($request_method = OPTIONS) {
                return 204;
            }
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}